server {
    listen 80;
    server_name localhost;

    location /savanna/ {
        proxy_pass http://savanna-birthday:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /site2/ {
        proxy_pass http://von-site-2:80/;
        proxy_set_header Host $host;
    }

    location / {
        return 301 /savanna/;
    }
}
